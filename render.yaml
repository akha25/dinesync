services:
  - type: web
    name: dinesync-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # This will be set manually in the Render dashboard
      - key: PORT
        value: 5000
